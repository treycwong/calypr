[project]
name = "calypr-nodes"
version = "0.0.0"
description = "Calypr node registry + built-in node types (the plugin backbone)."
requires-python = ">=3.12"
dependencies = [
  "calypr-dsl",
  "calypr-model",
  "calypr-storage",
  "langgraph>=0.2",
  "langchain-core>=0.3",
  "numpy>=1.26",  # langchain_core vector store + fake embeddings (the keyless demo KB)
  "pydantic>=2.9",
]

[tool.uv.sources]
calypr-dsl = { workspace = true }
calypr-model = { workspace = true }
calypr-storage = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/calypr_nodes"]
