[project]
name = "calypr-dsl"
version = "0.0.0"
description = "Calypr DSL — the GraphSpec contract (Pydantic source of truth) + TS codegen."
requires-python = ">=3.12"
dependencies = ["pydantic>=2.9"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/calypr_dsl"]
