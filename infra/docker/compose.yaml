name: calypr

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: calypr
      POSTGRES_PASSWORD: calypr
      POSTGRES_DB: calypr
    ports:
      - "5432:5432"
    volumes:
      - calypr_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calypr -d calypr"]
      interval: 3s
      timeout: 3s
      retries: 20

  # Self-hosted Notion MCP server for the Notion connector (Tier A, Path A). Runs with token
  # passthrough so one instance serves every workspace: Calypr forwards each workspace's Notion
  # bot token via the `Notion-Token` header (resolved from the vault at run time). Point
  # CALYPR_NOTION_MCP_URL at http://localhost:3100/mcp. See infra/CONNECTORS.md.
  notion-mcp:
    image: node:22-alpine
    command:
      - npx
      - -y
      - "@notionhq/notion-mcp-server"
      - --transport
      - http
      - --host
      - 0.0.0.0
      # Internal port must match the published port: the server's DNS-rebinding protection
      # validates the Host header against its own host:port, so a remap (e.g. 3333→3000) is
      # rejected as "Invalid Host header". 3333 is deliberately outside the web range (dev web
      # 3000, e2e web 3100) so this infra service never collides with a Next dev server.
      - --port
      - "3333"
      - --enable-token-passthrough
      # Isolated localhost only: the server's own bearer auth is off, so Calypr sends just the
      # per-workspace Notion-Token. In production run with `--auth-token <secret>` instead and
      # set CALYPR_NOTION_MCP_AUTH to the same value. See infra/CONNECTORS.md.
      - --unsafe-disable-auth
    ports:
      - "3333:3333"

volumes:
  calypr_pgdata:
